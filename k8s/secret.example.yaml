# Copy this file to secret.yaml, fill in real values, and keep it out of git.
# Run: cp k8s/secret.example.yaml k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: moon-bot-env
  namespace: moon-bot
type: Opaque
stringData:
  # Required
  SLACK_BOT_TOKEN: "xoxb-..."
  SLACK_APP_TOKEN: "xapp-..."
  CLOUDFLARE_ACCOUNT_ID: "..."
  CLOUDFLARE_API_TOKEN: "..."

  # Cloudflare Workers AI tuning
  # CLOUDFLARE_MODEL: "@cf/moonshotai/kimi-k2.7-code"
  # CLOUDFLARE_FALLBACK_MODEL: "@cf/moonshotai/kimi-k2.6"
  # CLOUDFLARE_TIMEOUT_MS: "120000"
  # CLOUDFLARE_RETRIES: "2"
  # AGENT_MAX_CONTEXT_MESSAGES: "0"
  # DIAGNOSE_LLM_PING: "true"

  # Agent behavior
  # SESSIONS_DIR: "/app/data/sessions"
  # MEMORY_FILE: "/app/data/sessions/memory.json"
  # THREAD_MAP_FILE: "/app/data/sessions/thread-map.json"
  # MAX_MEMORY_ENTRIES: "200"
  # MEMORY_CONTEXT_ENTRIES: "3"
  # AGENT_MAX_CONTEXT_MESSAGES: "0"
  # AGENT_SYSTEM_PROMPT_OVERRIDE: ""
  # FEEDBACK_LOG_FILE: "/app/data/sessions/feedback.jsonl"

  # Slack Real-Time Search fallback (optional)
  # SLACK_USER_TOKEN: "xoxp-..."
  # Optional test channel for `verify-slack` to confirm chat:write scope.
  # VERIFY_SLACK_TEST_CHANNEL: "C..."
  # Number of retries (and base backoff) for transient Slack API failures.
  # SLACK_SAY_RETRIES: "2"
  # SLACK_SAY_RETRY_BASE_MS: "1000"

  # GitHub read / in-process writes (at least one is required for GitHub tools)
  # GITHUB_TOKEN: "ghp_..."
  # GITHUB_APP_ID: "..."
  # GITHUB_INSTALLATION_ID: "..."
  # GITHUB_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----"
  # Optional JSON map from Slack user ID or email to GitHub handle for PR/issue footers.
  # GITHUB_USER_MAP: '{"U...":"alice","bob@example.com":"bob"}'
  # Local cloned code repositories (for search_code and hub-code skill)
  # CODE_REPOS_DIR: "/app/data/repos"

  # Optional integrations
  # PLAUSIBLE_API_KEY: "..."
  # PLAUSIBLE_UPSTREAM_URL: "https://plausible.io"
  # PLAUSIBLE_PROXY_PORT: "9203"
  # PLAUSIBLE_PROXY_TOKEN: "..."

  # ES_URL: "https://..."
  # ES_API_KEY: "..."
  # ES_USERNAME: "..."
  # ES_PASSWORD: "..."
  # ES_PROXY_PORT: "9201"
  # ES_PROXY_TOKEN: "..."

  # MONGODB_URI: "mongodb+srv://..."
  # MONGODB_DATABASE: "..."

  # AWS_ACCESS_KEY_ID: "..."
  # AWS_SECRET_ACCESS_KEY: "..."
  # AWS_SESSION_TOKEN: "..."
  # AWS_REGION: "us-east-1"

  # SIZZLE_DATA_DIR: "/app/data/sizzle"

  # HuggingFace Bucket for cross-restart persistence (defaults to LocalBucket if omitted)
  # HF_TOKEN: "hf_..."
  # HF_BUCKET_REPO: "..."
  # HF_PROXY_PORT: "9202"
  # HF_PROXY_TOKEN: "..."
  # HF_PROXY_REPO: "huggingface/storage-visualization-data"
  # HF_UPSTREAM_URL: "https://huggingface.co"

  # Artifact bucket (used for response/session artifacts and the local bucket server)
  # BUCKET_DIR: "/app/data/bucket"
  # BUCKET_HTTP_PORT: "3001"

  # Access tiers (comma-separated Slack user ID:tier pairs)
  # USER_TIERS: "U0000000001:privileged,U0000000002:elastic"
  # DEFAULT_ACCESS_TIER: "basic"
  # OKTA_DOMAIN: "your-org.okta.com"
  # OKTA_API_TOKEN: "00..."
  # OKTA_PRIVILEGED_GROUPS: "database-admins,infra-admins"
  # OKTA_ELASTIC_GROUPS: "elasticsearch-users,security-engineers"

  # Scheduled reports
  # SCHEDULED_WEEKLY_REPORT_CHANNEL: "C..."
  # SCHEDULED_DEPLOY_CHANNEL: "C..."
  # SCHEDULED_DEPLOY_MONITOR_DELAY_MS: "900000"
  #
  # Public status monitor (Agent for Good / civic tech)
  # STATUS_MONITOR_CHANNEL: "C..."
  # STATUS_MONITOR_PAGES: "https://status.cloudflare.com/api/v2/status.json,https://www.githubstatus.com/api/v2/status.json"
  # STATUS_MONITOR_CRON: "*/15 * * * *"
  # STATUS_MONITOR_STATE_FILE: "/app/data/sessions/status-monitor-state.json"

  # Feature flags
  # ALLOW_BASH: "false"
  # Optional tiered Linux user sandboxing for bash (requires root + users on host).
  # BASH_TIER_USERS: "basic:mb-runner,elastic:mb-elastic,privileged:mb-privileged"
  # BASH_REQUIRE_ROOT_FOR_SU: "true"
  # ALLOW_GUESTS: "false"
  # ALLOWED_USER_IDS: "U...,U..."
  # ADMIN_USER_IDS: "U...,U..."
  # SECURITY_AUDIT_LOG_FILE: "/app/data/security-audit.jsonl"
  # SLACK_SECURITY_ALERT_CHANNEL: "C..."

  # MCP servers (JSON map)
  # MCP_SERVERS: '{"my-server": {"command":"node","args":["/path/to/server.js"]}}'

  # Artifact bucket public URL (required by LocalBucket so Slack Block Kit links resolve)
  # BUCKET_PUBLIC_URL: "https://moon-bot.example.com"
