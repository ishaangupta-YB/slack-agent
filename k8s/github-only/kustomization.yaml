apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ishu

resources:
  - ../namespace.yaml
  - ../serviceaccount.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml

commonLabels:
  app.kubernetes.io/name: ishu

images:
  - name: ishu
    newName: ghcr.io/YOUR_ORG/ishu
    newTag: latest
