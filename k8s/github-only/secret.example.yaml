# Copy this file to secret.yaml, fill in real values, and keep it out of git.
# Run: cp k8s/github-only/secret.example.yaml k8s/github-only/secret.yaml
# This is the credential-poor secret for the GitHub-only Ishu pod.
# It deliberately omits Slack tokens and production database credentials.
apiVersion: v1
kind: Secret
metadata:
  name: ishu-github-only-env
  namespace: ishu
type: Opaque
stringData:
  # GitHub-only mode toggle
  GITHUB_ONLY: "true"

  # GitHub webhook receiver
  GITHUB_WEBHOOK_PORT: "3000"
  GITHUB_WEBHOOK_SECRET: "your-github-webhook-secret"

  # GitHub API credentials: provide a personal access token (GITHUB_TOKEN) OR
  # a GitHub App installation (GITHUB_APP_ID + GITHUB_PRIVATE_KEY + GITHUB_INSTALLATION_ID).
  # GITHUB_TOKEN: "ghp_..."
  # GITHUB_APP_ID: "123456"
  # GITHUB_INSTALLATION_ID: "12345678"
  # GITHUB_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----"

  # Optional JSON map from Slack user ID or email to GitHub handle; used to build
  # PR/issue footers when the Slack context is unavailable.
  # GITHUB_USER_MAP: '{"U...":"alice","bob@example.com":"bob"}'

  # GitHub API resilience tuning
  # GITHUB_API_RETRIES: "2"
  # GITHUB_API_RETRY_BASE_MS: "1000"
  # GITHUB_API_TIMEOUT_MS: "30000"

  # Scope restrictions
  # GITHUB_ONLY_ALLOWED_REPOS: "my-org/repo1,my-org/repo2"
  # GITHUB_ONLY_ALLOWED_ORGS: "my-org"

  # LLM provider (still required in GitHub-only mode)
  CLOUDFLARE_ACCOUNT_ID: "your-cloudflare-account-id"
  CLOUDFLARE_API_TOKEN: "your-cloudflare-api-token"

  # Cloudflare Workers AI tuning
  # CLOUDFLARE_MODEL: "@cf/moonshotai/kimi-k2.7-code"
  # CLOUDFLARE_FALLBACK_MODEL: "@cf/moonshotai/kimi-k2.6"
  # CLOUDFLARE_TIMEOUT_MS: "120000"
  # CLOUDFLARE_RETRIES: "2"

  # Agent behavior
  # SESSIONS_DIR: "/app/data/sessions"
  # MEMORY_FILE: "/app/data/sessions/memory.json"
  # THREAD_MAP_FILE: "/app/data/sessions/thread-map.json"
  # MAX_MEMORY_ENTRIES: "200"
  # MEMORY_CONTEXT_ENTRIES: "3"
  # AGENT_MAX_CONTEXT_MESSAGES: "0"

  # Local cloned code repositories (for search_code, clone_repo, and hub-code skill)
  # CODE_REPOS_DIR: "/app/data/repos"

  # HuggingFace Bucket for cross-restart persistence (defaults to LocalBucket if omitted)
  # HF_TOKEN: "hf_..."
  # HF_BUCKET_REPO: "..."

  # Artifact bucket (used for response/session artifacts and the local bucket server)
  # BUCKET_DIR: "/app/data/bucket"
  # BUCKET_HTTP_PORT: "3001"
  # Bind on all interfaces inside the pod so health checks and port-forwarding work.
  # BUCKET_HTTP_HOST: "0.0.0.0"

  # Access tiers (still honored in GitHub-only mode for bash/file-write gating)
  # USER_TIERS: "U0000000001:privileged"
  # DEFAULT_ACCESS_TIER: "basic"

  # Optional: bash tool (disabled by default)
  # ALLOW_BASH: "false"
