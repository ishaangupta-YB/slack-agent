name: Deploy to Cloudflare

# Builds the container image (Docker is available on GitHub runners) and deploys
# the Worker + Container defined in wrangler.jsonc. Slack / Cloudflare / R2
# credentials used at runtime are set as Worker secrets via `wrangler secret put`
# (see README) and are NOT stored in GitHub — only the deploy credentials are.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker + Container
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Cloudflare deploy secrets not configured; skipping deploy."
            exit 0
          fi
          npx wrangler deploy
