name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke tests
        run: npm run smoke

      - name: Ensure WRITEUP.md is not tracked
        run: |
          if git ls-files --error-unmatch WRITEUP.md >/dev/null 2>&1; then
            echo "ERROR: WRITEUP.md is tracked by git and must not be committed."
            exit 1
          fi

      - name: Ensure .env is not tracked
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "ERROR: .env is tracked by git and must not be committed."
            exit 1
          fi

      - name: Ensure k8s/secret.yaml is not tracked
        run: |
          if git ls-files --error-unmatch k8s/secret.yaml >/dev/null 2>&1; then
            echo "ERROR: k8s/secret.yaml contains secrets and must not be committed."
            exit 1
          fi

      - name: Validate Kubernetes YAML
        run: |
          python3 - <<'PY'
          import os, sys, yaml
          for root, _, files in os.walk('k8s'):
              for name in files:
                  if not name.endswith('.yaml'):
                      continue
                  path = os.path.join(root, name)
                  with open(path) as f:
                      try:
                          list(yaml.safe_load_all(f))
                      except yaml.YAMLError as e:
                          print(f'ERROR: invalid YAML in {path}: {e}', file=sys.stderr)
                          sys.exit(1)
          print('Kubernetes YAML is valid')
          PY
