name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke tests
        run: npm run smoke

      - name: Ensure WRITEUP.md is not tracked
        run: |
          if git ls-files --error-unmatch WRITEUP.md >/dev/null 2>&1; then
            echo "ERROR: WRITEUP.md is tracked by git and must not be committed."
            exit 1
          fi

      - name: Ensure .env is not tracked
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "ERROR: .env is tracked by git and must not be committed."
            exit 1
          fi
